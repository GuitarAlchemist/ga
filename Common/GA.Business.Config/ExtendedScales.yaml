# ===========================================================================
# ExtendedScales.yaml - pitch-class set catalog (cardinality 1-12)
# ===========================================================================
# Generated programmatically from first principles.
# Binary scale IDs: bitmask representation (bit i = pitch class i present).
# Interval vectors: standard music theory derivation.
# Forte numbers:    widely-adopted academic convention (Forte 1973 numbering).
# No text or naming from any third-party catalog is reproduced.
#
# Every non-empty 12-bit pitch-class subset (BinaryScaleId 1..4095 = 4095 entries).
#
# All properties derived mathematically from the 12-bit bitmask:
#   - PitchClasses    : space-separated 0..11
#   - Cardinality     : popcount(mask)
#   - IntervalVector  : IC1..IC6 counts (standard music set theory)
#   - ForteNumber     : from GA.Domain.Core.ForteCatalog (224 set classes);
#                       emitted as null when outside the 3-9 cardinality scope
#   - PrimeForm_Forte : Forte (1973) prime-form id. Compare set's normal order
#                       vs its inversion's normal order by lexicographic order
#                       of successive intervals (most-packed-from-left).
#   - PrimeForm_Rahn  : Rahn (1980) prime-form id. Same orbit, same normal order,
#                       but compare by lexicographic order of the PC values
#                       (cumulative intervals from the first PC).
#   - PrimeFormsAgree : true iff Forte and Rahn picked the same representative.
#                       Classic disagreements: 5-20, 6-Z29/50, 6-31, 7-20, 8-26.
#   - Complement      : (~mask) & 0xFFF
#   - Reflection      : bit i -> bit (12-i) mod 12
#   - Perfections     : pitch classes whose +7 partner is present
#   - IsPrime_Forte   : true iff this id equals its own Forte prime-form id
#   - IsPrime_Rahn    : true iff this id equals its own Rahn  prime-form id
#   - WellKnownName   : optional cross-reference from GA's curated Scales.yaml
#                       (absent when no established music-theory name exists)
#
