    PitchClasses: "0 3 4 6 7 9 10"
    BinaryScaleId: 1753
    Tuning: "12tet"
    Description: "Scale with raised second and flat seventh; distinctive augmented second at the start."
    Provenance: "traditional-knowledge"
    Sources:
      - "https://en.wikipedia.org/wiki/Hungarian_minor_scale"
