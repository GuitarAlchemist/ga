    PitchClasses: "0 2 4 5 7 9 10 11"
    BinaryScaleId: 3765
    Tuning: "12tet"
    Description: "Mixolydian with an added passing major seventh; designed to align chord tones on strong beats."
    Provenance: "traditional-knowledge"
    Sources:
      - "https://en.wikipedia.org/wiki/Bebop_scale"

