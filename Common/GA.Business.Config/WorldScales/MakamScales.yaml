# =============================================================================
# MakamScales.yaml - world-music scales: Turkish makam scales — 12-TET approximations of traditionally microtonal practice
# =============================================================================
#
# Data compiled from traditional-knowledge sources and publicly available
# references (Wikipedia, maqamworld.com, IMSLP, and primary musicological
# publications in the public domain). Only factual content is reproduced:
# scale names (not copyrightable), interval sequences (mathematical facts),
# and BinaryScaleId cross-references into ExtendedScales.yaml.
#
# No third-party prose is copied; all `Description` fields are original
# short summaries written for this catalog.
#
# Where a tradition uses microtonal intervals in authentic practice
# (Arabic maqam, Turkish makam, some Indian ragas, ancient Greek tonoi),
# the `Tuning` field is set to "approx-12tet" to flag that the intervals
# stored here are 12-equal-temperament approximations and not claims of
# perfect equivalence.
#
# Schema version : 1
# =============================================================================


WorldScales:
  - Name: "Ussak"
    Tradition: "Turkish Makam"
    AlternateNames: ["Uşşak", "Makam Ussak"]
    AlternateNames_fr: ["Makam Uşşak"]
    Intervals: [1, 3, 2, 2, 1, 2, 1]
    PitchClasses: "0 1 4 6 8 9 11"
    BinaryScaleId: 2899
    Tuning: "approx-12tet"
    Description: "Fundamental Turkish makam of the soft-chromatic family; uses a microtonal flat second in classical practice."
    Provenance: "traditional-knowledge"
    Sources:
      - "https://en.wikipedia.org/wiki/Turkish_makam"

