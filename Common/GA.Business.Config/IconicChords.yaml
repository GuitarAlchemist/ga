# Iconic Chord Configurations
# This file defines famous chord voicings with their cultural and historical significance

IconicChords:
  - Name: "Hendrix Chord"
    TheoreticalName: "E7#9"
    Description: "The signature chord from Purple Haze - a dominant 7th with a sharp 9th"
    Artist: "Jimi Hendrix"
    Song: "Purple Haze"
    Era: "1960s"
    Genre: "Rock/Blues"
    PitchClasses: [ 4, 8, 11, 2, 7 ]  # E, G#, B, D, G
    GuitarVoicing: [ 0, 7, 6, 7, 8, 0 ]  # Standard Hendrix chord voicing
    AlternateNames: [ "Purple Haze Chord", "E7#9" ]

  - Name: "James Bond Chord"
    TheoreticalName: "Em(maj7)"
    Description: "The mysterious spy movie chord - minor triad with major 7th"
    Artist: "John Barry"
    Song: "James Bond Theme"
    Era: "1960s"
    Genre: "Film Score"
    PitchClasses: [ 4, 7, 11, 3 ]  # E, G, B, D#
    GuitarVoicing: [ 0, 2, 1, 0, 0, 0 ]  # Em(maj7) open voicing
    AlternateNames: [ "Spy Chord", "Em(maj7)", "Minor-Major 7th" ]

  - Name: "Tristan Chord"
    TheoreticalName: "F7#11"
    Description: "Wagner's famous unresolved dissonance from Tristan und Isolde"
    Artist: "Richard Wagner"
    Song: "Tristan und Isolde"
    Era: "1860s"
    Genre: "Classical/Opera"
    PitchClasses: [ 5, 11, 3, 8 ]  # F, B, D#, G#
    AlternateNames: [ "Wagner Chord", "Tristan Dissonance" ]

  - Name: "Mystic Chord"
    TheoreticalName: "C6#11"
    Description: "Scriabin's synthetic chord built from fourths"
    Artist: "Alexander Scriabin"
    Song: "Prometheus"
    Era: "1910s"
    Genre: "Classical/Modern"
    PitchClasses: [ 0, 6, 10, 4, 9, 2 ]  # C, F#, Bb, E, A, D
    AlternateNames: [ "Prometheus Chord", "Scriabin Chord" ]

  - Name: "So What Chord"
    TheoreticalName: "Em11"
    Description: "Bill Evans' famous quartal voicing from Kind of Blue"
    Artist: "Bill Evans"
    Song: "So What"
    Era: "1950s"
    Genre: "Jazz"
    PitchClasses: [ 4, 9, 2, 7, 11 ]  # E, A, D, G, B
    AlternateNames: [ "Em11", "Quartal Voicing" ]  # "Evans Chord" retired — Evans is the artist, the chord-lore name points at his rootless LH voicing (separate entry below).

  - Name: "Mu Major Chord"
    TheoreticalName: "Cadd9(no3)"
    Description: "Steely Dan's signature chord - major with 9th but no 3rd"
    Artist: "Steely Dan"
    Song: "Various"
    Era: "1970s"
    Genre: "Jazz Rock"
    PitchClasses: [ 0, 7, 2 ]  # C, G, D
    GuitarVoicing: [ 0, 3, 0, 0, 3, 0 ]  # Cadd9(no3) voicing
    AlternateNames: [ "Mu Chord", "Add9(no3)", "Steely Dan Chord" ]

  - Name: "Elektra Chord"
    TheoreticalName: "E7b9#11"
    Description: "Strauss's dissonant chord from Elektra"
    Artist: "Richard Strauss"
    Song: "Elektra"
    Era: "1900s"
    Genre: "Classical/Modern"
    PitchClasses: [ 4, 8, 11, 2, 5, 10 ]  # E, G#, B, D, F, Bb
    AlternateNames: [ "Strauss Chord" ]

  - Name: "Petrushka Chord"
    TheoreticalName: "C/F# Polychord"
    Description: "Stravinsky's bitonal chord - C major over F# major"
    Artist: "Igor Stravinsky"
    Song: "Petrushka"
    Era: "1910s"
    Genre: "Classical/Modern"
    PitchClasses: [ 0, 4, 7, 6, 10, 1 ]  # C, E, G, F#, A#, C#
    AlternateNames: [ "Stravinsky Chord", "Bitonal Chord" ]

  - Name: "Cowboy Chord"
    TheoreticalName: "G"
    Description: "The classic open G major chord - staple of country and folk"
    Artist: "Traditional"
    Song: "Various"
    Era: "Traditional"
    Genre: "Country/Folk"
    PitchClasses: [ 7, 11, 2 ]  # G, B, D
    GuitarVoicing: [ 3, 2, 0, 0, 3, 3 ]  # Open G major
    AlternateNames: [ "Open G", "G Major" ]

  - Name: "Power Chord"
    TheoreticalName: "G5"
    Description: "The quintessential rock chord - root and fifth only"
    Artist: "Various Rock Artists"
    Song: "Various"
    Era: "1950s-Present"
    Genre: "Rock/Metal"
    PitchClasses: [ 7, 2 ]  # G, D
    GuitarVoicing: [ 3, 5, 5, -1, -1, -1 ]  # G5 power chord
    AlternateNames: [ "Fifth Chord", "G5" ]

  - Name: "Joni Mitchell Chord"
    TheoreticalName: "Dmaj7add6"
    Description: "Complex open tuning chord popularized by Joni Mitchell"
    Artist: "Joni Mitchell"
    Song: "Both Sides Now"
    Era: "1960s-70s"
    Genre: "Folk/Jazz"
    PitchClasses: [ 2, 6, 9, 1, 4 ]  # D, F#, A, C#, E
    AlternateNames: [ "Mitchell Voicing", "Open Tuning Chord" ]

  - Name: "Blackbird Chord"
    TheoreticalName: "G/B"
    Description: "The distinctive fingerpicked chord from The Beatles' Blackbird"
    Artist: "The Beatles"
    Song: "Blackbird"
    Era: "1960s"
    Genre: "Rock/Pop"
    PitchClasses: [ 7, 11, 2 ]  # G, B, D
    GuitarVoicing: [ 0, 0, 0, 0, 2, 0 ]  # Blackbird fingerpicking pattern
    AlternateNames: [ "Beatles Chord", "G/B" ]

  - Name: "Evans Chord"
    TheoreticalName: "Dm9 (rootless)"
    Description: "Bill Evans' signature rootless left-hand voicing — 3rd-5th-7th-9th stack"
    Artist: "Bill Evans"
    Song: "Peace Piece / Kind of Blue (Various)"
    Era: "1950s-60s"
    Genre: "Jazz"
    PitchClasses: [ 5, 9, 0, 4 ]  # F, A, C, E — Dm9 without the root
    AlternateNames: [ "Evans Voicing", "Rootless Dm9", "Bill Evans Chord" ]

  - Name: "A Hard Day's Night Chord"
    TheoreticalName: "G7sus4add9"
    Description: "The iconic jangly opening chord of the Beatles song — George Harrison's 12-string, McCartney's bass D, and Lennon's Fadd9 all layered. Academic consensus reads it as G-C-F-D-E."
    Artist: "The Beatles"
    Song: "A Hard Day's Night"
    Era: "1960s"
    Genre: "Rock/Pop"
    PitchClasses: [ 7, 0, 5, 2, 4 ]  # G, C, F, D, E
    AlternateNames: [ "Hard Day's Night Chord", "Beatles Intro Chord", "Fadd9/G" ]

  - Name: "Foxy Lady Chord"
    TheoreticalName: "F#m7#9"
    Description: "Hendrix's signature Foxy Lady chord — minor 7th with a sharp 9 tension. Different quality family from the Purple Haze #9 (which is dominant)."
    Artist: "Jimi Hendrix"
    Song: "Foxy Lady"
    Era: "1960s"
    Genre: "Rock/Blues"
    PitchClasses: [ 6, 9, 1, 4, 8 ]  # F#, A, C#, E, G# (with alteration)
    AlternateNames: [ "Hendrix Foxy Chord", "Minor Sharp 9" ]

  - Name: "Farben Chord"
    TheoreticalName: "Pentachord Op.16 No.3"
    Description: "Schoenberg's 'Summer Morning by a Lake' pentachord — a five-note klangfarben color-chord, analyzed by David Lewin as a foundational atonal set class."
    Artist: "Arnold Schoenberg"
    Song: "Five Pieces for Orchestra, Op. 16 No. 3"
    Era: "1910s"
    Genre: "Classical/Atonal"
    PitchClasses: [ 0, 3, 4, 7, 8 ]  # Forte 5-21 (klangfarben pentachord)
    AlternateNames: [ "Summer Morning Chord", "Klangfarben Chord", "Schoenberg Op.16 Chord" ]

  - Name: "Debussy Chord"
    TheoreticalName: "Cmaj9"
    Description: "The floating, impressionist added-9th major seventh associated with Debussy's harmonic language — often voiced in quartal stacks to blur triadic function."
    Artist: "Claude Debussy"
    Song: "Various (La Mer, Préludes)"
    Era: "1890s-1910s"
    Genre: "Classical/Impressionist"
    PitchClasses: [ 0, 4, 7, 11, 2 ]  # C, E, G, B, D
    AlternateNames: [ "Impressionist Chord", "Cmaj9 Floating" ]

