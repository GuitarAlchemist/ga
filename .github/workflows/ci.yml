name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.1xx'
  NODE_VERSION: '20.x'

jobs:
  # ============================================
  # BUILD JOB
  # ============================================
  build:
    name: Build Solution
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: Restore dependencies
      run: dotnet restore AllProjects.slnx
      
    - name: Build solution
      run: dotnet build AllProjects.slnx --configuration Release --no-restore
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          **/bin/Release/**
          !**/bin/Release/**/ref/**
          # ASP.NET Core's StaticWebAssetsLoader resolves precompressed bundles
          # from obj/Release/net10.0/compressed/ at host startup. The Backend
          # Tests job runs WebApplicationFactory<Program> with --no-build, so
          # if these aren't restored alongside the bin/ artifacts the host
          # crashes with `DirectoryNotFoundException : .../compressed/` before
          # any test method runs — every GaApi.Tests fixture fails as a
          # phantom mass-fail (no inner exception in the published TRX).
          # See PR #198 for the symmetric AI:ChatProvider=ollama factory fix.
          **/obj/Release/**/compressed/**
          **/obj/Release/**/staticwebassets*/**
        retention-days: 1

  # ============================================
  # BACKEND TESTS JOB
  # ============================================
  test-backend:
    name: Backend Tests
    runs-on: windows-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    # The build job uploads `**/bin/Release/**` so test jobs can run with
    # --no-build instead of recompiling. Without this download, dotnet test
    # fails immediately with "test source file ... was not found" for every
    # *.Tests.dll. The artifact restores into the workspace at the same
    # relative paths it was uploaded from, so dotnet test finds the DLLs
    # at their expected `Tests/.../bin/Release/net10.0/` locations.
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts

    - name: Restore dependencies
      run: dotnet restore AllProjects.slnx

    - name: Run backend tests
      # Performance tests excluded: Coverlet's `RecordHit` instrumentation
      # injected into hot search paths adds ~3-4x overhead per call, which
      # blows past the 50ms-per-query SLO baked into
      # GpuVoicingSearchPerformanceTests + sibling perf classes. The tests
      # still run locally (no `--collect`) and in any future dedicated perf
      # workflow that runs without coverage.
      run: |
        dotnet test AllProjects.slnx `
          --configuration Release `
          --no-build `
          --filter "TestCategory!=Integration&TestCategory!=RequiresModel&TestCategory!=Performance&TestCategory!=Timing" `
          --logger "trx;LogFileName=test-results.trx" `
          --logger "console;verbosity=normal" `
          --collect:"XPlat Code Coverage" `
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
      
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: '**/TestResults/**'
        retention-days: 7
        
    - name: Publish test results
      uses: EnricoMi/publish-unit-test-result-action/windows@v2
      if: always()
      with:
        files: '**/TestResults/**/*.trx'
        check_name: Backend Test Results

  # ============================================
  # PLAYWRIGHT TESTS JOB
  # ============================================
  test-playwright:
    name: Playwright Tests
    runs-on: windows-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts

    - name: Restore dependencies
      run: dotnet restore AllProjects.slnx

    - name: Build Playwright tests
      run: dotnet build Tests/GuitarAlchemistChatbot.Tests.Playwright/GuitarAlchemistChatbot.Tests.Playwright.csproj --configuration Release

    - name: Install Playwright browsers
      run: |
        cd Tests/GuitarAlchemistChatbot.Tests.Playwright
        pwsh bin/Release/net10.0/playwright.ps1 install --with-deps

    # Start GaApi + run Playwright tests in ONE step. Splitting them
    # caused ga#128 (re-confirmed in PR #129's diagnostic): GaApi spawned
    # via Start-Process gets killed when the launching pwsh exits at
    # step end (Windows attaches child processes to the parent's job
    # object, even with -WindowStyle Hidden). Single step keeps the
    # pwsh alive throughout `dotnet test`, so the Start-Process child
    # stays alive too. try/finally guarantees cleanup on test failure
    # or runner timeout.
    #
    # ga#134 step 1 additions inside the merged step:
    #   - ASPNETCORE_CONTENTROOT pinned to Apps/ga-server/GaApi so
    #     ASP.NET resolves `wwwroot` correctly (PR #122 logs showed
    #     "WebRootPath was not found: D:\a\ga\ga\wwwroot" — workspace
    #     root, not the project folder, hiding chatbot-demo.html).
    #   - CHATBOT_BASE_URL env var so ChatbotTestBase.BaseUrl matches
    #     what GaApi actually serves (was hardcoded https://localhost:7001
    #     placeholder that never matched any binding — see ga#134 thread).
    - name: Start GaApi + Run Playwright tests (single step — see ga#128, ga#134)
      shell: pwsh
      run: |
        $apiDll = "Apps/ga-server/GaApi/bin/Release/net10.0/GaApi.dll"
        if (-not (Test-Path $apiDll)) {
          throw "GaApi.dll not found at $apiDll — build artifacts may not have downloaded correctly"
        }
        $env:ASPNETCORE_URLS = "http://localhost:5232"
        $env:ASPNETCORE_ENVIRONMENT = "CI"
        $env:ASPNETCORE_CONTENTROOT = (Resolve-Path "Apps/ga-server/GaApi").Path
        $env:CHATBOT_BASE_URL = "http://localhost:5232/chatbot-demo.html"
        $start = Get-Date
        $gaapiProc = Start-Process -NoNewWindow -PassThru -FilePath "dotnet" -ArgumentList $apiDll `
          -RedirectStandardOutput "gaapi-stdout.log" `
          -RedirectStandardError "gaapi-stderr.log"
        Write-Host "GaApi spawned with PID $($gaapiProc.Id), ContentRoot=$($env:ASPNETCORE_CONTENTROOT), BaseUrl=$($env:CHATBOT_BASE_URL)"

        # Liveness probe (401-blind). Any HTTP response = server up;
        # only network errors keep polling. Background: ga#128 captured
        # logs proving the previous 200-only probe missed a healthy
        # GaApi returning 401 in CI's no-auth context.
        $deadline = $start.AddSeconds(180)
        $apiUp = $false
        while ((Get-Date) -lt $deadline -and -not $apiUp) {
          try {
            $r = Invoke-WebRequest -Uri "http://localhost:5232/api/chatbot/status" -UseBasicParsing -TimeoutSec 2 -ErrorAction Stop
            $elapsed = [math]::Round(((Get-Date) - $start).TotalSeconds, 1)
            Write-Host "GaApi up after ${elapsed}s (HTTP $($r.StatusCode))"
            $apiUp = $true
          } catch {
            $resp = $_.Exception.Response
            if ($resp -ne $null) {
              $code = [int]$resp.StatusCode
              $elapsed = [math]::Round(((Get-Date) - $start).TotalSeconds, 1)
              Write-Host "GaApi up after ${elapsed}s (HTTP $code, treating non-2xx as live)"
              $apiUp = $true
            } else {
              Start-Sleep -Seconds 3
            }
          }
        }
        if (-not $apiUp) {
          Write-Host "::error::GaApi failed to start within 180s"
          Write-Host "--- gaapi-stdout.log (tail 80) ---"
          if (Test-Path gaapi-stdout.log) { Get-Content gaapi-stdout.log -Tail 80 }
          Write-Host "--- gaapi-stderr.log (tail 80) ---"
          if (Test-Path gaapi-stderr.log) { Get-Content gaapi-stderr.log -Tail 80 }
          if (-not $gaapiProc.HasExited) { Stop-Process -Id $gaapiProc.Id -Force -ErrorAction SilentlyContinue }
          exit 1
        }

        # Sanity-check static-file serving before Playwright. If
        # chatbot-demo.html doesn't 200, ContentRoot is wrong and tests
        # will all fail "selector not found" downstream — this gives
        # actionable signal upstream.
        try {
          $page = Invoke-WebRequest -Uri "http://localhost:5232/chatbot-demo.html" -UseBasicParsing -TimeoutSec 5 -ErrorAction Stop
          Write-Host "chatbot-demo.html OK ($($page.StatusCode), $($page.Content.Length) bytes)"
        } catch {
          $resp = $_.Exception.Response
          if ($resp -ne $null) {
            Write-Host "::warning::chatbot-demo.html returned HTTP $([int]$resp.StatusCode); ContentRoot may still be wrong"
          } else {
            Write-Host "::warning::chatbot-demo.html network error: $($_.Exception.Message)"
          }
        }

        try {
          # The rest of this Playwright project is a legacy generated catalog
          # for a richer chatbot UI and live LLM/tool stack. CI serves
          # chatbot-demo.html, so keep PR validation to the stable smoke path:
          # static page load + SignalR hub connection.
          dotnet test Tests/GuitarAlchemistChatbot.Tests.Playwright/GuitarAlchemistChatbot.Tests.Playwright.csproj `
            --configuration Release `
            --no-build `
            --filter "FullyQualifiedName=GuitarAlchemistChatbot.Tests.Playwright.ChatbotWebSocketTests.WebSocket_ShouldConnectSuccessfully" `
            --logger "trx;LogFileName=playwright-results.trx" `
            --logger "console;verbosity=normal"
          $testExitCode = $LASTEXITCODE
        } finally {
          if (-not $gaapiProc.HasExited) {
            Write-Host "Stopping GaApi PID $($gaapiProc.Id)"
            Stop-Process -Id $gaapiProc.Id -Force -ErrorAction SilentlyContinue
          }
        }
        exit $testExitCode

    - name: Upload GaApi logs (always)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: gaapi-logs
        path: |
          gaapi-stdout.log
          gaapi-stderr.log
        if-no-files-found: ignore
        retention-days: 7
      
    - name: Upload Playwright test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-results
        path: '**/TestResults/**'
        retention-days: 7
        
    - name: Upload Playwright screenshots
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: playwright-screenshots
        path: '**/screenshots/**'
        retention-days: 7

  # ============================================
  # CODE QUALITY JOB
  # ============================================
  code-quality:
    name: Code Quality
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore dependencies
      run: dotnet restore AllProjects.slnx
      
    - name: Run code analysis
      run: dotnet build AllProjects.slnx --configuration Release --no-restore /p:TreatWarningsAsErrors=false
      
    - name: Check formatting
      run: dotnet format AllProjects.slnx --verify-no-changes --verbosity diagnostic
      continue-on-error: true

  # ============================================
  # FRONTEND BUILD JOB
  # ============================================
  build-frontend:
    name: Build Frontend
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: Apps/ga-client/package.json
        
    - name: Install dependencies
      run: |
        cd Apps/ga-client
        npm ci

    # ga-client lazy-imports across packages (App.tsx → ReactComponents/
    # ga-react-components/src/pages/...). When rollup processes those files
    # during build it walks up node_modules from the imported file's directory,
    # so it never reaches Apps/ga-client/node_modules. Install the sibling
    # package's deps too so bare specifiers (`three`, `jotai`, etc.) resolve.
    #
    # Why `npm install` and not `npm ci`: ReactComponents/ga-react-components
    # ships a `pnpm-lock.yaml`, not a `package-lock.json`, AND the repo root
    # `.gitignore` has unscoped `package-lock.json` so a generated lockfile
    # can't be committed without carving an exception. `npm ci` requires a
    # committed `package-lock.json` and fails fast otherwise (PR #105's
    # initial CI failure). `npm install` works against the existing
    # package.json, generates an in-memory lockfile, and `--ignore-scripts`
    # avoids running `patch-package` (the postinstall hook that's not
    # available on a fresh CI runner). `--no-audit --no-fund` keeps the
    # log noise down.
    - name: Install ReactComponents dependencies
      run: |
        cd ReactComponents/ga-react-components
        npm install --ignore-scripts --no-audit --no-fund

    - name: Lint frontend
      run: |
        cd Apps/ga-client
        npm run lint
      continue-on-error: true
        
    - name: Build frontend
      run: |
        cd Apps/ga-client
        npm run build
        
    - name: Upload frontend artifacts
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: Apps/ga-client/dist
        retention-days: 7

  # ============================================
  # SECURITY SCAN JOB
  # ============================================
  security-scan:
    name: Security Scan
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore dependencies
      run: dotnet restore AllProjects.slnx
      
    - name: Run security scan
      run: |
        dotnet list AllProjects.slnx package --vulnerable --include-transitive
      continue-on-error: true

  # ============================================
  # SUMMARY JOB
  # ============================================
  summary:
    name: CI Summary
    runs-on: windows-latest
    needs: [build, test-backend, test-playwright, code-quality, build-frontend, security-scan]
    if: always()
    
    steps:
    - name: Check job results
      run: |
        echo "Build: ${{ needs.build.result }}"
        echo "Backend Tests: ${{ needs.test-backend.result }}"
        echo "Playwright Tests: ${{ needs.test-playwright.result }}"
        echo "Code Quality: ${{ needs.code-quality.result }}"
        echo "Frontend Build: ${{ needs.build-frontend.result }}"
        echo "Security Scan: ${{ needs.security-scan.result }}"
        
    - name: Fail if any job failed
      if: |
        needs.build.result == 'failure' ||
        needs.test-backend.result == 'failure' ||
        needs.test-playwright.result == 'failure'
      run: exit 1

