name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.1xx'
  NODE_VERSION: '20.x'

jobs:
  # ============================================
  # BUILD JOB
  # ============================================
  build:
    name: Build Solution
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: Restore dependencies
      run: dotnet restore AllProjects.slnx
      
    - name: Build solution
      run: dotnet build AllProjects.slnx --configuration Release --no-restore
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          **/bin/Release/**
          !**/bin/Release/**/ref/**
        retention-days: 1

  # ============================================
  # BACKEND TESTS JOB
  # ============================================
  test-backend:
    name: Backend Tests
    runs-on: windows-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    # The build job uploads `**/bin/Release/**` so test jobs can run with
    # --no-build instead of recompiling. Without this download, dotnet test
    # fails immediately with "test source file ... was not found" for every
    # *.Tests.dll. The artifact restores into the workspace at the same
    # relative paths it was uploaded from, so dotnet test finds the DLLs
    # at their expected `Tests/.../bin/Release/net10.0/` locations.
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts

    - name: Restore dependencies
      run: dotnet restore AllProjects.slnx

    - name: Run backend tests
      run: |
        dotnet test AllProjects.slnx `
          --configuration Release `
          --no-build `
          --filter "TestCategory!=Integration&TestCategory!=RequiresModel" `
          --logger "trx;LogFileName=test-results.trx" `
          --logger "console;verbosity=normal" `
          --collect:"XPlat Code Coverage" `
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
      
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: '**/TestResults/**'
        retention-days: 7
        
    - name: Publish test results
      uses: EnricoMi/publish-unit-test-result-action/windows@v2
      if: always()
      with:
        files: '**/TestResults/**/*.trx'
        check_name: Backend Test Results

  # ============================================
  # PLAYWRIGHT TESTS JOB
  # ============================================
  test-playwright:
    name: Playwright Tests
    runs-on: windows-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts

    - name: Restore dependencies
      run: dotnet restore AllProjects.slnx

    - name: Build Playwright tests
      run: dotnet build Tests/GuitarAlchemistChatbot.Tests.Playwright/GuitarAlchemistChatbot.Tests.Playwright.csproj --configuration Release

    - name: Install Playwright browsers
      run: |
        cd Tests/GuitarAlchemistChatbot.Tests.Playwright
        pwsh bin/Release/net10.0/playwright.ps1 install --with-deps

    # Start GaApi in the background so Playwright tests have something to
    # connect to on http://localhost:5232 (the http profile in
    # Apps/ga-server/GaApi/Properties/launchSettings.json). Without this,
    # tests fail with `ECONNREFUSED ::1:5232`. The 180s deadline matches
    # observed startup: the API loads voicing/embedding binary caches,
    # Yarp config, and the governance watcher before accepting requests
    # (PR #122 first run reached cache-loading at ~30s, hadn't reached
    # /api/chatbot/status by 60s).
    - name: Start GaApi (background)
      shell: pwsh
      run: |
        $apiDll = "Apps/ga-server/GaApi/bin/Release/net10.0/GaApi.dll"
        if (-not (Test-Path $apiDll)) {
          throw "GaApi.dll not found at $apiDll — build artifacts may not have downloaded correctly"
        }
        $env:ASPNETCORE_URLS = "http://localhost:5232"
        $env:ASPNETCORE_ENVIRONMENT = "CI"
        $start = Get-Date
        Start-Process -NoNewWindow -FilePath "dotnet" -ArgumentList $apiDll `
          -RedirectStandardOutput "gaapi-stdout.log" `
          -RedirectStandardError "gaapi-stderr.log"
        $deadline = $start.AddSeconds(180)
        while ((Get-Date) -lt $deadline) {
          try {
            $r = Invoke-WebRequest -Uri "http://localhost:5232/api/chatbot/status" -UseBasicParsing -TimeoutSec 2
            if ($r.StatusCode -eq 200) {
              $elapsed = [math]::Round(((Get-Date) - $start).TotalSeconds, 1)
              Write-Host "GaApi up after ${elapsed}s"
              exit 0
            }
          } catch { Start-Sleep -Seconds 3 }
        }
        Write-Host "::error::GaApi failed to start within 180s"
        Write-Host "--- gaapi-stdout.log (tail 80) ---"
        if (Test-Path gaapi-stdout.log) { Get-Content gaapi-stdout.log -Tail 80 }
        Write-Host "--- gaapi-stderr.log (tail 80) ---"
        if (Test-Path gaapi-stderr.log) { Get-Content gaapi-stderr.log -Tail 80 }
        exit 1

    - name: Run Playwright tests
      run: |
        dotnet test Tests/GuitarAlchemistChatbot.Tests.Playwright/GuitarAlchemistChatbot.Tests.Playwright.csproj `
          --configuration Release `
          --no-build `
          --logger "trx;LogFileName=playwright-results.trx" `
          --logger "console;verbosity=normal"

    - name: Upload GaApi logs (always)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: gaapi-logs
        path: |
          gaapi-stdout.log
          gaapi-stderr.log
        if-no-files-found: ignore
        retention-days: 7
      
    - name: Upload Playwright test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-results
        path: '**/TestResults/**'
        retention-days: 7
        
    - name: Upload Playwright screenshots
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: playwright-screenshots
        path: '**/screenshots/**'
        retention-days: 7

  # ============================================
  # CODE QUALITY JOB
  # ============================================
  code-quality:
    name: Code Quality
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore dependencies
      run: dotnet restore AllProjects.slnx
      
    - name: Run code analysis
      run: dotnet build AllProjects.slnx --configuration Release --no-restore /p:TreatWarningsAsErrors=false
      
    - name: Check formatting
      run: dotnet format AllProjects.slnx --verify-no-changes --verbosity diagnostic
      continue-on-error: true

  # ============================================
  # FRONTEND BUILD JOB
  # ============================================
  build-frontend:
    name: Build Frontend
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: Apps/ga-client/package.json
        
    - name: Install dependencies
      run: |
        cd Apps/ga-client
        npm ci

    # ga-client lazy-imports across packages (App.tsx → ReactComponents/
    # ga-react-components/src/pages/...). When rollup processes those files
    # during build it walks up node_modules from the imported file's directory,
    # so it never reaches Apps/ga-client/node_modules. Install the sibling
    # package's deps too so bare specifiers (`three`, `jotai`, etc.) resolve.
    #
    # Why `npm install` and not `npm ci`: ReactComponents/ga-react-components
    # ships a `pnpm-lock.yaml`, not a `package-lock.json`, AND the repo root
    # `.gitignore` has unscoped `package-lock.json` so a generated lockfile
    # can't be committed without carving an exception. `npm ci` requires a
    # committed `package-lock.json` and fails fast otherwise (PR #105's
    # initial CI failure). `npm install` works against the existing
    # package.json, generates an in-memory lockfile, and `--ignore-scripts`
    # avoids running `patch-package` (the postinstall hook that's not
    # available on a fresh CI runner). `--no-audit --no-fund` keeps the
    # log noise down.
    - name: Install ReactComponents dependencies
      run: |
        cd ReactComponents/ga-react-components
        npm install --ignore-scripts --no-audit --no-fund

    - name: Lint frontend
      run: |
        cd Apps/ga-client
        npm run lint
      continue-on-error: true
        
    - name: Build frontend
      run: |
        cd Apps/ga-client
        npm run build
        
    - name: Upload frontend artifacts
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: Apps/ga-client/dist
        retention-days: 7

  # ============================================
  # SECURITY SCAN JOB
  # ============================================
  security-scan:
    name: Security Scan
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore dependencies
      run: dotnet restore AllProjects.slnx
      
    - name: Run security scan
      run: |
        dotnet list AllProjects.slnx package --vulnerable --include-transitive
      continue-on-error: true

  # ============================================
  # SUMMARY JOB
  # ============================================
  summary:
    name: CI Summary
    runs-on: windows-latest
    needs: [build, test-backend, test-playwright, code-quality, build-frontend, security-scan]
    if: always()
    
    steps:
    - name: Check job results
      run: |
        echo "Build: ${{ needs.build.result }}"
        echo "Backend Tests: ${{ needs.test-backend.result }}"
        echo "Playwright Tests: ${{ needs.test-playwright.result }}"
        echo "Code Quality: ${{ needs.code-quality.result }}"
        echo "Frontend Build: ${{ needs.build-frontend.result }}"
        echo "Security Scan: ${{ needs.security-scan.result }}"
        
    - name: Fail if any job failed
      if: |
        needs.build.result == 'failure' ||
        needs.test-backend.result == 'failure' ||
        needs.test-playwright.result == 'failure'
      run: exit 1

