name: Auto-Update Demerzel Submodule

on:
  repository_dispatch:
    types: [demerzel-updated]
  # Fallback: check every 6 hours in case dispatch was missed
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours UTC

permissions:
  contents: write
  pull-requests: write

defaults:
  run:
    shell: bash

jobs:
  update-submodule:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "demerzel-bot"
          git config user.email "demerzel-bot@users.noreply.github.com"

      - name: Check current submodule state
        id: check
        run: |
          cd governance/demerzel
          CURRENT=$(git rev-parse --short HEAD)
          git fetch origin master
          LATEST=$(git rev-parse --short origin/master)
          BEHIND=$(git rev-list --count HEAD..origin/master)

          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT

          echo "Submodule at $CURRENT, latest is $LATEST, $BEHIND commits behind"

      - name: Skip if up to date
        if: steps.check.outputs.behind == '0'
        run: echo "Submodule is up to date, nothing to do"

      - name: Update submodule
        if: steps.check.outputs.behind != '0'
        run: |
          cd governance/demerzel
          git checkout origin/master
          cd ../..
          git add governance/demerzel

      # Auto-commit for small updates (<=10 commits behind)
      - name: Auto-commit small update
        if: steps.check.outputs.behind != '0' && steps.check.outputs.behind <= 10
        run: |
          BEHIND=${{ steps.check.outputs.behind }}
          git commit -m "chore: update Demerzel submodule ($BEHIND commits)"
          git push origin main
          echo "### Auto-updated Demerzel submodule ($BEHIND commits)" >> $GITHUB_STEP_SUMMARY

      # Create PR for large updates (>10 commits behind)
      - name: Create PR for large update
        if: steps.check.outputs.behind != '0' && steps.check.outputs.behind > 10
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          BEHIND=${{ steps.check.outputs.behind }}
          CURRENT=${{ steps.check.outputs.current }}
          LATEST=${{ steps.check.outputs.latest }}
          BRANCH="chore/update-demerzel-$(date +%Y%m%d)"

          git checkout -b "$BRANCH"
          git commit -m "chore: update Demerzel submodule ($BEHIND commits)"
          git push origin "$BRANCH"

          # Get recent commit messages for PR body
          cd governance/demerzel
          CHANGES=$(git log --oneline "$CURRENT..$LATEST" | head -15)
          cd ../..

          gh pr create \
            --title "chore: update Demerzel submodule ($BEHIND commits behind)" \
            --body "$(cat <<EOF
          ## Demerzel Submodule Update

          The governance submodule is **$BEHIND commits behind** — creating a PR for review since this is a large update.

          - **Current:** \`$CURRENT\`
          - **Latest:** \`$LATEST\`

          ### Recent changes:
          \`\`\`
          $CHANGES
          \`\`\`

          ---
          *Auto-generated by submodule-auto-update workflow*
          EOF
          )"

          echo "### Created PR to update Demerzel submodule ($BEHIND commits)" >> $GITHUB_STEP_SUMMARY
