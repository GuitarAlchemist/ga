name: README Drift Sensor

# Weekly cross-repo README staleness check. Mechanism doc:
# docs/methodology/readme-drift.md. Closes the user observation 2026-05-17
# ("README.md on all repos don't look up to date") by surfacing drift as a
# durable signal rather than a once-and-forget sweep.
#
# What it does each Monday at 08:00 UTC:
# 1. Checks out ga + every sibling listed in baseline.json `tracked_repos`.
# 2. Runs Scripts/readme-drift-survey.ps1 against the checkout layout.
# 3. Writes state/quality/readme-drift/YYYY-MM-DD.json on ga's main branch.
# 4. Opens or updates a single tracking issue listing every stale README.
#
# Snapshot consumed by ix-quality-trend (same loader as chatbot-qa +
# embeddings). Filename strictness (`YYYY-MM-DD.json`) matches the
# 2026-05-16 loader fix from PR #250.
#
# Failure semantics:
# - Missing sibling checkouts are logged as `absent` in the report, not
#   failed. The PAT_TOKEN secret must have read access to all
#   GuitarAlchemist/* repos.
# - If the survey script crashes, the workflow fails loudly.

on:
  schedule:
    - cron: '0 8 * * 1'  # Mondays 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: readme-drift-sensor
  cancel-in-progress: false

jobs:
  survey:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout ga
        uses: actions/checkout@v4
        with:
          path: ga
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Checkout siblings
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # Sibling list mirrors baseline.json tracked_repos. Update both together.
          for repo in ix Demerzel tars guitaralchemist.github.io agent-blackbox demerzel-bot ga-godot hari; do
            echo "Cloning $repo..."
            if gh repo clone "GuitarAlchemist/$repo" "$repo" -- --depth=50 --no-tags 2>/dev/null; then
              echo "  ok"
            else
              echo "  WARN: clone failed for $repo — survey will mark it absent"
            fi
          done
          ls -la

      - name: Setup PowerShell
        run: pwsh --version

      - name: Run drift survey
        id: survey
        shell: pwsh
        run: |
          $date = (Get-Date).ToUniversalTime().ToString('yyyy-MM-dd')
          $out  = "ga/state/quality/readme-drift/$date.json"
          # The survey resolves siblings via -SiblingsRoot. CI runner checks
          # ga + all siblings out into the workspace root.
          pwsh ga/Scripts/readme-drift-survey.ps1 `
            -SiblingsRoot (Get-Location).Path `
            -Baseline ga/state/quality/readme-drift/baseline.json `
            -OutPath $out
          echo "snapshot=$out"            >> $env:GITHUB_OUTPUT
          echo "date=$date"               >> $env:GITHUB_OUTPUT

      - name: Commit snapshot if new
        working-directory: ga
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          DATE: ${{ steps.survey.outputs.date }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "state/quality/readme-drift/${DATE}.json"
          if git diff --cached --quiet; then
            echo "Snapshot identical to existing — nothing to commit."
            exit 0
          fi
          git commit -m "chore(quality): readme-drift snapshot ${DATE} [skip ci]"
          git push

      - name: Open or update tracking issue
        working-directory: ga
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          DATE: ${{ steps.survey.outputs.date }}
        shell: pwsh
        run: |
          $report = Get-Content "state/quality/readme-drift/${env:DATE}.json" -Raw | ConvertFrom-Json
          $stale  = $report.repos | Where-Object { $_.status -in @('stale','very-stale') }
          if (-not $stale) {
            Write-Host "No stale READMEs — closing tracking issue if it exists."
            $existing = gh issue list --label readme-drift --state open --json number,title --limit 5 | ConvertFrom-Json
            foreach ($i in $existing) {
              gh issue close $i.number --comment "All tracked READMEs are within the freshness window as of ${env:DATE}. Closing automatically; will reopen if drift returns."
            }
            return
          }
          $body = "## README drift report — ${env:DATE}`n`n"
          $body += "Auto-generated by `.github/workflows/readme-drift-sensor.yml`. Mechanism: [docs/methodology/readme-drift.md](../blob/main/docs/methodology/readme-drift.md).`n`n"
          $body += "| Repo | Status | README touch | HEAD | Drift |`n"
          $body += "|---|---|---|---|---|`n"
          foreach ($r in $stale) {
            $body += "| **$($r.repo)** | $($r.status) | $($r.readme_touch) | $($r.head_date) | $($r.drift_days)d |`n"
          }
          $body += "`n_Summary: total=$($report.summary.total), ok=$($report.summary.ok), borderline=$($report.summary.borderline), stale=$($report.summary.stale), very_stale=$($report.summary.very_stale), absent=$($report.summary.absent)._`n"
          $body += "`nRemediation: refresh each stale README and merge. Sensor reopens this issue weekly until clean."
          $existing = gh issue list --label readme-drift --state open --json number,title --limit 1 | ConvertFrom-Json
          if ($existing) {
            $n = $existing[0].number
            Write-Host "Updating existing issue #$n"
            $body | gh issue comment $n -F -
            gh issue edit $n --title "README drift — ${env:DATE} (${($stale.Count)} stale)"
          } else {
            Write-Host "Opening new tracking issue"
            $body | gh issue create --title "README drift — ${env:DATE} ($($stale.Count) stale)" --label readme-drift -F -
          }

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: readme-drift-${{ github.run_id }}
          path: ga/state/quality/readme-drift/
          retention-days: 90
