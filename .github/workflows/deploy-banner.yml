name: Deploy banner to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'banner/**'
      - 'ReactComponents/ga-react-components/src/components/Ocean/**'
      - '.github/workflows/deploy-banner.yml'
  workflow_dispatch: {}

# Only one banner deploy at a time. Cancel any in-flight run when a new
# commit lands — the latest commit wins.
concurrency:
  group: deploy-banner
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Install just the bare-module deps Ocean.tsx pulls in, into the
      # directory Vite will walk up into from those source files. We
      # use a tmp dir to avoid npm reading ga-react-components'
      # package.json (which hard-pins @esbuild/win32-x64 and therefore
      # refuses to install on Linux runners).
      - name: Install Ocean peer deps (three, react, react-dom)
        run: |
          tmp=$(mktemp -d)
          pushd "$tmp" >/dev/null
          npm init -y >/dev/null
          npm install --no-save --no-audit --no-fund \
            three@0.180.0 react@18.3.1 react-dom@18.3.1
          popd >/dev/null
          mkdir -p ReactComponents/ga-react-components/node_modules
          cp -a "$tmp/node_modules/." ReactComponents/ga-react-components/node_modules/
          rm -rf "$tmp"

      - name: Install banner deps
        working-directory: banner
        run: npm install --no-audit --no-fund

      - name: Build banner
        working-directory: banner
        env:
          # Deployed path on github.io is /<repo>/. If you ever move the
          # site to user pages (guitaralchemist.github.io) flip this to '/'.
          VITE_BANNER_BASE: /ga/
        run: npm run build

      # banner.png is committed to banner/public/banner.png — Vite
      # copies it into dist/ during build. We used to capture it
      # via Playwright here, but GitHub runners have no GPU and
      # SwiftShader renders WebGPU compute as black frames. Ship
      # a real screenshot; regenerate manually when the scene
      # materially changes.

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: banner/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
