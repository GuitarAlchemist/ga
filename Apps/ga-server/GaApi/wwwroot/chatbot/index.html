<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Guitar Alchemist Chatbot Demo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 800px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .status {
            padding: 10px 20px;
            background: #f0f0f0;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
            color: #666;
        }

        .status.connected {
            background: #d4edda;
            color: #155724;
        }

        .status.disconnected {
            background: #f8d7da;
            color: #721c24;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f9f9f9;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .message.user {
            align-items: flex-end;
        }

        .message.assistant {
            align-items: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border: 1px solid #ddd;
        }

        .message-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
            padding: 0 10px;
        }

        .trace-badge {
            max-width: 70%;
            padding: 6px 10px;
            margin-bottom: 4px;
            background: #f3f1fa;
            border: 1px solid #d8d3ee;
            border-radius: 8px;
            font-size: 11.5px;
            color: #555;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .trace-badge .trace-chip {
            background: white;
            border: 1px solid #d8d3ee;
            border-radius: 10px;
            padding: 1px 8px;
            font-family: 'SF Mono', Consolas, Menlo, monospace;
            font-size: 11px;
            color: #4a4a6a;
        }

        .trace-badge .trace-chip.agent {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
            font-weight: 600;
        }

        .trace-badge .trace-chip.confidence-high   { color: #1f7a4d; border-color: #b4dbc4; }
        .trace-badge .trace-chip.confidence-medium { color: #b27a00; border-color: #e8d398; }
        .trace-badge .trace-chip.confidence-low    { color: #a83232; border-color: #e6b6b6; }

        .trace-badge .trace-toggle {
            margin-left: auto;
            background: transparent;
            border: 0;
            color: #667eea;
            cursor: pointer;
            font: inherit;
            text-decoration: underline;
            padding: 0;
        }

        .trace-details {
            max-width: 70%;
            margin-bottom: 8px;
            padding: 10px 12px;
            background: #fafaff;
            border: 1px solid #e3dff5;
            border-radius: 8px;
            font-size: 11.5px;
            color: #444;
            display: none;
        }

        .trace-details.open { display: block; }
        .trace-details pre {
            white-space: pre-wrap;
            word-break: break-word;
            font-family: 'SF Mono', Consolas, Menlo, monospace;
            font-size: 11px;
            color: #333;
            margin-top: 4px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2.5px solid #d4d0ee;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spinner-rotate 0.9s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spinner-rotate {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        .thinking-text {
            font-style: italic;
            color: #667eea;
            font-weight: 500;
        }

        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .chat-input:focus {
            border-color: #667eea;
        }

        .send-button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .send-button:hover {
            transform: scale(1.05);
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: none;
            padding: 10px 16px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 18px;
            max-width: 70px;
        }

        .typing-indicator.active {
            display: block;
        }

        .typing-indicator span {
            height: 8px;
            width: 8px;
            background: #999;
            border-radius: 50%;
            display: inline-block;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }

        .showcase-button {
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.45);
            color: white;
            padding: 6px 14px;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 14px;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.15s ease;
        }

        .showcase-button:hover {
            background: rgba(255, 255, 255, 0.32);
        }

        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-backdrop.open {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 12px;
            width: min(92%, 720px);
            max-height: 86vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            padding: 14px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 17px;
            font-weight: 600;
        }

        .modal-close {
            background: transparent;
            border: 0;
            color: white;
            font-size: 26px;
            cursor: pointer;
            line-height: 1;
            padding: 0;
            width: 30px;
            height: 30px;
        }

        .modal-content {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }

        .modal-footer {
            padding: 10px 20px;
            background: #f7f7fa;
            font-size: 12px;
            color: #666;
            border-top: 1px solid #eaeaee;
        }

        .showcase-category {
            margin-bottom: 22px;
        }

        .showcase-category:last-child {
            margin-bottom: 0;
        }

        .showcase-category h3 {
            font-size: 15px;
            font-weight: 600;
            color: #2a2a3a;
            margin-bottom: 4px;
        }

        .showcase-category-description {
            font-size: 12.5px;
            color: #777;
            margin-bottom: 10px;
        }

        .showcase-prompt {
            display: block;
            width: 100%;
            text-align: left;
            background: #f6f6fa;
            border: 1px solid #e3e3eb;
            color: #333;
            padding: 10px 12px;
            margin-bottom: 6px;
            border-radius: 6px;
            cursor: pointer;
            font: inherit;
            transition: background 0.12s ease, border-color 0.12s ease;
        }

        .showcase-prompt:hover {
            background: #ecedf5;
            border-color: #667eea;
        }

        .showcase-prompt-text {
            font-weight: 500;
            margin-bottom: 3px;
            color: #2a2a3a;
        }

        .showcase-prompt-desc {
            font-size: 11.5px;
            color: #888;
        }

        .showcase-loading,
        .showcase-error {
            text-align: center;
            padding: 32px 12px;
            color: #777;
        }

        .showcase-error {
            color: #b13a3a;
        }

        .clear-button {
            padding: 8px 16px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 14px;
            cursor: pointer;
            margin-left: 10px;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        🎸 Guitar Alchemist Chatbot
        <button class="showcase-button" id="showcaseButton" onclick="openShowcase()">✨ Showcase</button>
    </div>
    <div class="status" id="status">Connecting...</div>
    <div class="chat-messages" id="messages">
        <div class="message assistant">
            <div class="message-label">Assistant</div>
            <div class="message-content">
                Welcome to Guitar Alchemist! I'm here to help you learn guitar chords, scales, techniques, and music
                theory. Ask me anything!
            </div>
        </div>
    </div>
    <div class="chat-input-container">
        <input class="chat-input" id="messageInput" placeholder="Ask me about chords, scales, or techniques..."
               type="text"/>
        <button class="send-button" id="sendButton" onclick="sendMessage()">Send</button>
        <button class="clear-button" onclick="clearHistory()">Clear</button>
    </div>
</div>

<div class="modal-backdrop" id="showcaseModal" onclick="closeShowcaseOnBackdrop(event)">
    <div class="modal" role="dialog" aria-labelledby="showcaseTitle">
        <div class="modal-header">
            <h2 id="showcaseTitle">✨ Showcase — What This Chatbot Can Do</h2>
            <button class="modal-close" aria-label="Close" onclick="closeShowcase()">×</button>
        </div>
        <div class="modal-content" id="showcaseContent">
            <div class="showcase-loading">Loading…</div>
        </div>
        <div class="modal-footer">
            Click any prompt to send it. Every prompt runs the real backend pipeline.
        </div>
    </div>
</div>

<script>
    let connection;
    let currentMessage = '';
    let isReceiving = false;
    let pendingRouting = null;  // last MessageRoutingMetadata received, attached to the next assistant message

    // Initialize SignalR connection
    async function initializeConnection() {
        connection = new signalR.HubConnectionBuilder()
            .withUrl("/hubs/chatbot")
            .withAutomaticReconnect()
            .build();

        connection.on("Connected", (message) => {
            console.log("Connected:", message);
            updateStatus("Connected", true);
        });

        connection.on("MessageRoutingMetadata", (meta) => {
            // Capture and render the trace badge immediately — the server emits
            // this BEFORE the first text chunk, so the user sees which agent
            // handled the request while the answer is still being streamed.
            // Remove the "thinking" indicator: we now know which skill is
            // running and can show real progress.
            removeThinkingIndicator();
            pendingRouting = meta;
            renderTraceBadge(meta);
        });

        connection.on("ReceiveMessageChunk", (chunk) => {
            if (!isReceiving) {
                isReceiving = true;
                currentMessage = '';
                removeThinkingIndicator();
                addTypingIndicator();
            }
            currentMessage += chunk;
            updateLastMessage(currentMessage);
        });

        connection.on("MessageComplete", (fullMessage) => {
            isReceiving = false;
            removeTypingIndicator();
            updateLastMessage(fullMessage);
            pendingRouting = null;
            enableInput();
        });

        connection.on("Error", (error) => {
            console.error("Error:", error);
            addMessage("assistant", `Error: ${error}`);
            enableInput();
        });

        connection.onreconnecting(() => {
            updateStatus("Reconnecting...", false);
        });

        connection.onreconnected(() => {
            updateStatus("Connected", true);
        });

        connection.onclose(() => {
            updateStatus("Disconnected", false);
        });

        try {
            await connection.start();
            console.log("SignalR Connected");
        } catch (err) {
            console.error("Connection failed:", err);
            updateStatus("Connection failed. Please ensure the API is running.", false);
        }
    }

    function updateStatus(message, isConnected) {
        const status = document.getElementById('status');
        status.textContent = message;
        status.className = 'status ' + (isConnected ? 'connected' : 'disconnected');
    }

    function addMessage(role, content) {
        const messagesDiv = document.getElementById('messages');
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role}`;
        messageDiv.innerHTML = `
                <div class="message-label">${role === 'user' ? 'You' : 'Assistant'}</div>
                <div class="message-content">${content}</div>
            `;
        messagesDiv.appendChild(messageDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function renderTraceBadge(meta) {
        if (!meta) return;
        const messagesDiv = document.getElementById('messages');

        const conf = typeof meta.confidence === 'number' ? meta.confidence : 0;
        const confLabel =
            conf >= 0.8 ? 'confidence-high'   :
            conf >= 0.5 ? 'confidence-medium' :
                          'confidence-low';
        const confPct = `${Math.round(conf * 100)}%`;

        const grounding = meta.grounding
            ? `<span class="trace-chip" title="Grounding source">📚 ${escapeHtml(meta.grounding.source || '')}${meta.grounding.revision ? ' @' + escapeHtml(meta.grounding.revision) : ''}</span>`
            : '';

        const badge = document.createElement('div');
        badge.className = 'trace-badge';
        badge.innerHTML = `
            <span class="trace-chip agent">${escapeHtml(meta.agentId || 'direct')}</span>
            <span class="trace-chip ${confLabel}" title="Routing confidence">${confPct}</span>
            <span class="trace-chip" title="Routing method">via ${escapeHtml(meta.routingMethod || 'unknown')}</span>
            ${grounding}
            <button class="trace-toggle" type="button">Show trace ▾</button>
        `;

        const details = document.createElement('div');
        details.className = 'trace-details';
        details.innerHTML = `<pre>${escapeHtml(JSON.stringify(meta, null, 2))}</pre>`;

        const toggle = badge.querySelector('.trace-toggle');
        toggle.addEventListener('click', () => {
            const open = details.classList.toggle('open');
            toggle.textContent = open ? 'Hide trace ▴' : 'Show trace ▾';
        });

        messagesDiv.appendChild(badge);
        messagesDiv.appendChild(details);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function addTypingIndicator() {
        const messagesDiv = document.getElementById('messages');
        const indicator = document.createElement('div');
        indicator.className = 'message assistant';
        indicator.id = 'typing-indicator';
        indicator.innerHTML = `
                <div class="message-label">Assistant</div>
                <div class="typing-indicator active">
                    <span></span><span></span><span></span>
                </div>
            `;
        messagesDiv.appendChild(indicator);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function removeTypingIndicator() {
        const indicator = document.getElementById('typing-indicator');
        if (indicator) {
            indicator.remove();
        }
    }

    function updateLastMessage(content) {
        const messagesDiv = document.getElementById('messages');
        const lastMessage = messagesDiv.querySelector('.message.assistant:last-child');
        if (lastMessage && lastMessage.id !== 'typing-indicator') {
            lastMessage.querySelector('.message-content').textContent = content;
        } else {
            removeTypingIndicator();
            addMessage('assistant', content);
        }
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const message = input.value.trim();

        if (!message || !connection) return;

        addMessage('user', message);
        input.value = '';
        disableInput();
        // Show a "thinking" indicator immediately — the agentic pipeline can
        // take 20-60s on French / long-form prompts before the first SSE
        // chunk arrives. Without this the UI looks frozen and users assume
        // it hung. The indicator is removed by addTypingIndicator() (which
        // replaces it with the per-chunk indicator) when the first chunk
        // actually lands.
        addThinkingIndicator();

        try {
            await connection.invoke("SendMessage", message, true);
        } catch (err) {
            console.error("Send failed:", err);
            removeThinkingIndicator();
            addMessage('assistant', `Failed to send message: ${err.message}`);
            enableInput();
        }
    }

    function addThinkingIndicator() {
        removeThinkingIndicator();
        const messagesDiv = document.getElementById('messages');
        const indicator = document.createElement('div');
        indicator.className = 'message assistant';
        indicator.id = 'thinking-indicator';
        indicator.innerHTML = `
            <div class="message-label">Assistant</div>
            <div class="message-content"><span class="spinner"></span><span class="thinking-text">Thinking…</span></div>
        `;
        messagesDiv.appendChild(indicator);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function removeThinkingIndicator() {
        const el = document.getElementById('thinking-indicator');
        if (el) el.remove();
    }

    async function clearHistory() {
        if (!connection) return;

        try {
            await connection.invoke("ClearHistory");
            document.getElementById('messages').innerHTML = '';
            addMessage('assistant', 'Conversation history cleared. How can I help you?');
        } catch (err) {
            console.error("Clear failed:", err);
        }
    }

    function disableInput() {
        document.getElementById('messageInput').disabled = true;
        document.getElementById('sendButton').disabled = true;
    }

    function enableInput() {
        document.getElementById('messageInput').disabled = false;
        document.getElementById('sendButton').disabled = false;
        document.getElementById('messageInput').focus();
    }

    // Handle Enter key
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            sendMessage();
        }
    });

    // ── Showcase ────────────────────────────────────────────────────────────
    function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;',
        }[c]));
    }

    function renderShowcase(script) {
        if (!script || !Array.isArray(script.categories) || script.categories.length === 0) {
            return '<div class="showcase-loading">No showcase categories available.</div>';
        }
        return script.categories.map(cat => `
            <div class="showcase-category">
                <h3>${escapeHtml(cat.name)}</h3>
                <div class="showcase-category-description">${escapeHtml(cat.description)}</div>
                ${cat.prompts.map(p => `
                    <button class="showcase-prompt" data-prompt="${escapeHtml(p.prompt)}">
                        <div class="showcase-prompt-text">${escapeHtml(p.prompt)}</div>
                        <div class="showcase-prompt-desc">${escapeHtml(p.description)}</div>
                    </button>
                `).join('')}
            </div>
        `).join('');
    }

    async function openShowcase() {
        const modal = document.getElementById('showcaseModal');
        const content = document.getElementById('showcaseContent');
        modal.classList.add('open');
        content.innerHTML = '<div class="showcase-loading">Loading…</div>';
        try {
            const resp = await fetch('/api/chatbot/demo');
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const script = await resp.json();
            content.innerHTML = renderShowcase(script);
            content.querySelectorAll('.showcase-prompt').forEach(btn => {
                btn.addEventListener('click', () => sendShowcasePrompt(btn.dataset.prompt));
            });
        } catch (err) {
            content.innerHTML = `<div class="showcase-error">Could not load showcase: ${escapeHtml(err.message)}</div>`;
        }
    }

    function closeShowcase() {
        document.getElementById('showcaseModal').classList.remove('open');
    }

    function closeShowcaseOnBackdrop(event) {
        if (event.target.id === 'showcaseModal') closeShowcase();
    }

    function sendShowcasePrompt(prompt) {
        if (!prompt) return;
        closeShowcase();
        const input = document.getElementById('messageInput');
        input.value = prompt;
        sendMessage();
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeShowcase();
    });

    // Initialize on load
    initializeConnection();
</script>
</body>
</html>
