version: '3.8'

services:
  # ============================================
  # MONGODB
  # ============================================
  mongodb:
    image: mongo:7.0.5-alpine
    container_name: ga-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: guitar-alchemist
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
    volumes:
      - mongodb-data:/data/db
    networks:
      - ga-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet -u admin -p ${MONGO_ROOT_PASSWORD:-changeme}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 1g
    cpus: "1"

  # ============================================
  # MONGO EXPRESS (Database UI)
  # ============================================
  mongo-express:
    image: mongo-express:1.0.2-alpine
    container_name: ga-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://admin:${MONGO_ROOT_PASSWORD:-changeme}@mongodb:27017/
      ME_CONFIG_MONGODB_ADMIN_USERNAME: admin
      ME_CONFIG_MONGODB_ADMIN_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
      ME_CONFIG_BASICAUTH: true
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-changeme}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ga-network
    healthcheck:
      test: wget -q -O - http://localhost:8081 | grep -q "Mongo Express" || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    mem_limit: 512m
    cpus: "0.5"

  # ============================================
  # GAAPI (Main API Server)
  # ============================================
  gaapi:
    build:
      context: .
      dockerfile: Apps/ga-server/GA.AI.Service/Dockerfile
    container_name: ga-api
    restart: unless-stopped
    ports:
      - "7001:8080"
      - "7000:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080;http://+:8081
      - MongoDB__ConnectionString=mongodb://admin:${MONGO_ROOT_PASSWORD:-changeme}@mongodb:27017
      - MongoDB__DatabaseName=guitaralchemist
      - Graphiti__BaseUrl=http://graphiti-service:8000
      - Ollama__BaseUrl=http://ollama:11434
      - Ollama__Model=qwen:0.5b
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      mongodb:
        condition: service_healthy
      graphiti-service:
        condition: service_healthy
    volumes:
      - ./Notebooks:/app/Notebooks:ro
      - ./Common/GA.Business.ML/Documentation:/app/Documentation:ro
      - ./Scripts/integration:/app/Scripts/integration:ro
    networks:
      - ga-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    mem_limit: 2g
    cpus: "2"

  # ============================================
  # CHATBOT (Blazor Application)
  # ============================================
  chatbot:
    build:
      context: .
      dockerfile: Apps/GuitarAlchemistChatbot/Dockerfile
    container_name: ga-chatbot
    restart: unless-stopped
    ports:
      - "7002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - MongoDB__ConnectionString=mongodb://admin:${MONGO_ROOT_PASSWORD:-changeme}@mongodb:27017
      - MongoDB__DatabaseName=guitaralchemist
      - GaApi__BaseUrl=http://gaapi:8080
      - Graphiti__BaseUrl=http://graphiti-service:8000
    depends_on:
      gaapi:
        condition: service_healthy
      graphiti-service:
        condition: service_healthy
    networks:
      - ga-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    mem_limit: 1.5g
    cpus: "1.5"

  # ============================================
  # REACT FRONTEND
  # ============================================
  ga-client:
    build:
      context: .
      dockerfile: Apps/ga-client/Dockerfile
    container_name: ga-client
    restart: unless-stopped
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:7001
    depends_on:
      - gaapi
    networks:
      - ga-network
    healthcheck:
      test: [ "CMD", "wget", "-q", "-O", "-", "http://localhost:80/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    mem_limit: 256m
    cpus: "0.5"
    read_only: true
    tmpfs:
      - /var/run/nginx
      - /var/cache/nginx

  # ============================================
  # ANGULAR DASHBOARD
  # ============================================
  ga-dashboard:
    build:
      context: ./Apps/ga-dashboard
      dockerfile: Dockerfile
    container_name: ga-dashboard
    restart: unless-stopped
    ports:
      - "4200:80"
    networks:
      - ga-network
    healthcheck:
      test: [ "CMD", "wget", "-q", "-O", "-", "http://localhost:80/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    mem_limit: 256m
    cpus: "0.5"
    read_only: true
    tmpfs:
      - /var/run/nginx
      - /var/cache/nginx

  # ============================================
  # FALKORDB (Graph Database for Graphiti)
  # ============================================
  falkordb:
    image: falkordb/falkordb:4.0.0
    container_name: ga-falkordb
    restart: unless-stopped
    ports:
      - "6379:6379"
      - "3000:3000"
    volumes:
      - falkordb-data:/data
    networks:
      - ga-network
    healthcheck:
      test: [ "CMD", "redis-cli", "-p", "6379", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 512m
    cpus: "1"

  # ============================================
  # GRAPHITI SERVICE (Knowledge Graph)
  # ============================================
  graphiti-service:
    build:
      context: ./Apps/ga-graphiti-service
      dockerfile: Dockerfile
    container_name: ga-graphiti-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - GRAPH_DB_TYPE=falkordb
      - FALKORDB_HOST=falkordb
      - FALKORDB_PORT=6379
      - FALKORDB_DATABASE=graphiti
      - OLLAMA_BASE_URL=http://ollama:11434/v1
      - OLLAMA_CHAT_MODEL=qwen:0.5b
      - OLLAMA_EMBEDDING_MODEL=nomic-embed-text
      - MONGODB_CONNECTION_STRING=mongodb://admin:${MONGO_ROOT_PASSWORD:-changeme}@mongodb:27017
      - MONGODB_DATABASE_NAME=guitaralchemist
      - GRAPHITI_TELEMETRY_ENABLED=false
      - SEMAPHORE_LIMIT=10
    depends_on:
      falkordb:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - ga-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 1.5g
    cpus: "1.5"

  # ============================================
  # JAEGER (Distributed Tracing - Optional)
  # ============================================
  jaeger:
    image: jaegertracing/all-in-one:1.51.0
    container_name: ga-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - ga-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:16686/api/services" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    mem_limit: 512m
    cpus: "0.5"

  # ============================================
  # QDRANT (Vector Database)
  # ============================================
  qdrant:
    image: qdrant/qdrant:v1.10.1
    container_name: ga-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - ga-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:6333/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    mem_limit: 1g
    cpus: "1"

  # ============================================
  # OLLAMA (Model Runner)
  # ============================================
  ollama:
    image: ollama/ollama:0.1.32
    container_name: ga-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - ga-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:11434/api/status" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 4g
    cpus: "2"
  # ============================================
  # MCP GATEWAY (Docker AI)
  # ============================================
  mcp-gateway:
    image: docker/mcp-gateway:latest
    container_name: ga-mcp-gateway
    restart: unless-stopped
    command:
      - --transport=sse
      - --port=8811
      - --servers=mongodb,redis,memory
    ports:
      - "8811:8811"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - ga-network
  # ============================================
  # MESHY AI MCP SERVER (Custom Python Server)
  # ============================================
  meshy-mcp:
    build:
      context: ./mcp-servers/meshy-ai
      dockerfile: Dockerfile
    container_name: ga-meshy-mcp
    restart: unless-stopped
    environment:
      - MESHY_API_KEY=${MESHY_API_KEY:-msy_ntI4R9Qk4x4c9v7BDvH6wJ7cwcyUUvMAMr0S}
    # Command to run over SSE instead of standard IO if supported, 
    # but the script may only support stdio by default.
    # In stdio mode, Docker MCP Gateway can connect to it by executing docker run.
    # We will keep the container running so it can be mapped or executed into.
    command: ["tail", "-f", "/dev/null"] # Idle container for easy IDE stdio proxy
    networks:
      - ga-network

volumes:
  mongodb-data:
    driver: local
  falkordb-data:
    driver: local
  qdrant-data:
    driver: local
  ollama-data:
    driver: local

networks:
  ga-network:
    driver: bridge
