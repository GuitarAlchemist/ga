  # ── case sensitivity / pitch-class spelling variants ────────────────────

  - prompt: "notes in c major"
    category: case-variants
    # routes_to pinned 2026-07-20 as a REGRESSION GUARD for issue #555. The
    # first version of that fix sent this prompt from skill.scaleinfo 0.93 to
    # fallback-direct 0.00 — chord-quality anchors pull bare "<root> <quality>"
    # queries across, and once ChordInfoSkill wins it cannot parse "c major" as
    # a chord symbol, so the query falls through to the LLM. The substring
    # invariants below still passed while that happened (the LLM answered
    # correctly), so only pinning the route catches it.
    routes_to: skill.scaleinfo
    contains: ["C", "D", "E", "F", "G", "A", "B"]
    min_length: 20
