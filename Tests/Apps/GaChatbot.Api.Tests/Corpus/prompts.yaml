# GA Chatbot prompt corpus — invariant gate
#
# Each entry asserts what a real user-facing answer must contain, must NOT
# contain, and where it must route to. Run by PromptCorpusTests.cs against
# the GaChatbot.Api host (the host actually serving demos.guitaralchemist.com).
#
# Tags map to the architecture:
#   routes_to                — expected agentId from /chat response
#   routing_method           — optional expected routing.method
#   contains                 — substrings that MUST appear (case-insensitive)
#   contains_any             — at least one of these must appear
#   not_contains             — substrings that must NOT appear
#   min_length               — minimum useful answer size (chars)
#   max_elapsed_ms           — soft latency budget (warns if exceeded)
#   expected_grounding       — expected grounding.source ("ga.dsl", "ix-compatible", null)
#   category                 — bucket name for failure aggregation
#   skip                     — if true, prompt is documented but not run
#   skip_reason              — why it's skipped (must be set when skip=true)
#
# Trace-shape invariants (process validation, opt-in per prompt; PR #222):
#   must_not_fallback        — fail if trace visits orchestration.fallback
#                              or gen_ai.chat.fallback (i.e. orchestrator
#                              gave up on skills and called LLM directly)
#   forbidden_agent_ids      — fail if any trace step's agent.id is in
#                              this list (catches semantic-similarity
#                              misroutes like "major vs minor" →
#                              skill.relativekey)
#   min_routing_confidence   — fail if orchestration.answer step's
#                              routing.confidence is below this value
#
# Universally-banned phrases (any answer with these is a regression):
#   - "Reproduce the catalog below verbatim"   ← leaked SKILL.md preamble
#   - "Pure pedagogy"                          ← leaked SKILL.md preamble
#   - "Use when a learner asks"                ← leaked SKILL.md preamble
#   - "returned no matches"                    ← unloaded OPTIC-K index
#   - "not yet implemented"                    ← stub response
# These are baked into PromptCorpusTests.UniversalBannedMarkers; per-prompt
# `not_contains` adds prompt-specific bans on top.

prompts:

  # ── modes (domain-backed ModesSkill, refactored 2026-05-13) ─────────────
  - prompt: "What are the modes of the major scale"
    category: modes
    routes_to: skill.modes
    contains: ["Ionian", "Dorian", "Phrygian", "Lydian", "Mixolydian", "Aeolian", "Locrian"]
    not_contains: ["I don't know"]
    min_length: 200
    max_elapsed_ms: 30000
    retry: 0                          # deterministic-skill — wording variance is a real bug

  - prompt: "What are the modes of melodic minor"
    category: modes
    routes_to: skill.modes
    contains: ["Melodic Minor", "Lydian Dominant", "Altered"]
    min_length: 150
    max_elapsed_ms: 30000
    retry: 0                          # deterministic-skill — wording variance is a real bug

  - prompt: "What are the modes of harmonic minor"
    category: modes
    routes_to: skill.modes
    contains: ["Harmonic Minor", "Phrygian"]
    min_length: 150
    max_elapsed_ms: 30000
    retry: 0                          # deterministic-skill — wording variance is a real bug

  - prompt: "What is Lydian dominant"
    category: modes
    routes_to: skill.modes
    contains_any: ["Lydian Dominant", "Acoustic"]
    contains: ["#4", "b7"]
    min_length: 100
    max_elapsed_ms: 30000
    retry: 0                          # deterministic-skill — wording variance is a real bug

  - prompt: "Phrygian dominant"
    category: modes
    routes_to: skill.modes
    contains: ["Phrygian Dominant"]
    min_length: 80
    max_elapsed_ms: 30000
    retry: 0                          # deterministic-skill — wording variance is a real bug

  - prompt: "Tell me about Hijaz"
    category: modes
    routes_to: skill.modes
    contains_any: ["Hijaz", "Phrygian Dominant"]
    min_length: 80
    max_elapsed_ms: 30000
    retry: 0                          # deterministic-skill — wording variance is a real bug

  - prompt: "What are the byzantine modes"
    category: modes
    routes_to: skill.modes
    contains_any: ["Byzantine", "Double Harmonic"]
    min_length: 80
    max_elapsed_ms: 30000
    retry: 0                          # deterministic-skill — wording variance is a real bug

  # ── scales / keys ───────────────────────────────────────────────────────
  - prompt: "Show me the notes in C major"
    category: scales-keys
    contains: ["C", "D", "E", "F", "G", "A", "B"]
    min_length: 30
    max_elapsed_ms: 20000

  - prompt: "What is the relative minor of G major"
    category: scales-keys
    contains: ["E minor"]
    min_length: 30
    max_elapsed_ms: 20000

  - prompt: "What are the diatonic chords in G major"
    category: scales-keys
    routes_to: skill.diatonicchords
    contains: ["G", "Am", "Bm", "C", "D", "Em"]
    contains_any: ["F#°", "F#m7b5", "vii°"]
    expected_grounding: ga.dsl
    min_length: 100
    max_elapsed_ms: 30000
    retry: 0                          # ga.dsl-backed → deterministic answer

  - prompt: "What are the diatonic chords in D major"
    category: scales-keys
    routes_to: skill.diatonicchords
    contains: ["D", "Em", "F#m", "G", "A", "Bm"]
    expected_grounding: ga.dsl
    min_length: 100
    max_elapsed_ms: 30000
    retry: 0                          # ga.dsl-backed → deterministic answer

  # ── theory ──────────────────────────────────────────────────────────────
  - prompt: "Explain the circle of fifths"
    category: theory
    contains_any: ["fifth", "perfect fifth"]
    contains: ["key signature"]
    min_length: 200
    max_elapsed_ms: 45000

  - prompt: "What is the difference between major and minor"
    category: theory
    contains_any: ["third", "interval", "scale", "chord", "quality", "tonality", "sad", "happy", "key", "semitone"]
    min_length: 150
    max_elapsed_ms: 45000
    # Trace-shape invariants (added 2026-05-16, infra from PR #222).
    # The 2026-05-15 live probe trace showed skill.relativekey grabbing
    # this prompt via semantic similarity ("major / minor / key" embed
    # close to its description) → routing.confidence 0.1 →
    # orchestration.fallback → gen_ai.chat.fallback timeout. Asserting
    # the trajectory turns that 18-second timeout into a clear named
    # failure ("trace visited forbidden agent.id 'skill.relativekey'")
    # at the moment of the misroute.
    forbidden_agent_ids: ["skill.relativekey"]
    must_not_fallback: true

  # ── chord operations (ga_dsl_eval-backed) ───────────────────────────────
  - prompt: "Transpose C E G to D"
    category: operations
    contains: ["D", "F#", "A"]
    expected_grounding: ga.dsl
    min_length: 30
    max_elapsed_ms: 20000

  - prompt: "What are the common tones between Cmaj7 and Am7"
    category: operations
    contains: ["C", "E", "G"]
    expected_grounding: ga.dsl
    min_length: 50
    max_elapsed_ms: 20000

  - prompt: "Are 0146 and 0137 z-related"
    category: operations
    contains: ["Z"]
    contains_any: ["z-related", "Z-related", "same interval"]
    min_length: 50
    max_elapsed_ms: 20000

  # ── progressions / substitution ─────────────────────────────────────────
  - prompt: "Identify the key of Am F C G"
    category: progressions
    contains_any: ["C major", "A minor"]
    min_length: 50
    max_elapsed_ms: 45000

  - prompt: "Suggest substitutions for G7 in a ii-V-I"
    category: progressions
    min_length: 100
    max_elapsed_ms: 60000

  # Routing regression (fix/chatbot-progression-routing, 2026-05-30): the verbose
  # "give me a <Roman-numeral> progression in <key>" phrasing misrouted to tab.optimize
  # (whose example "make this progression smoother to play" was the cosine attractor),
  # which then replied "I need a tab in the message". Must route to the diatonic-chords
  # skill and spell the chords. routes_to + forbidden_agent_ids + not_contains lock the
  # exact prior failure; the terse "ii-V-I in Bb" guards that the new examples did not
  # regress the form that already worked.
  - prompt: "give me a ii-V-I progression in Bb"
    category: progressions
    routes_to: skill.diatonicchords
    # Progression-SHAPE assertion (SKILL.md progression-selection section): the
    # ii-V-I in Bb is Cm - F - Bb. A correct answer contains Cm + Bb and must NOT
    # dump the full diatonic set — Dm (iii) and Gm (vi) appear only if the skill
    # listed all seven chords instead of extracting the requested degrees. This
    # is the regression that caught the original gap (#377 routed correctly but
    # returned the full key inventory).
    contains: ["Cm", "Bb"]
    not_contains: ["I need a tab", "paste a tab", "Dm", "Gm"]
    forbidden_agent_ids: ["tab.optimize", "tab.analyze"]
    must_not_fallback: true
    min_length: 30                    # a terse 3-chord progression answer is fine
    max_elapsed_ms: 45000
    retry: 1                          # routing is deterministic; the progression FORMATTING is LLM — one retry absorbs wording variance

  - prompt: "ii-V-I in Bb"
    category: progressions
    routes_to: skill.diatonicchords
    contains: ["Cm", "Bb"]
    forbidden_agent_ids: ["tab.optimize"]
    min_length: 50
    max_elapsed_ms: 45000
    retry: 0

